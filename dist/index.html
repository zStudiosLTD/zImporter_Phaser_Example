<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zImporter Example</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: black;
            width: 100vw;
            height: 100vh;
        }

        /* Style the button to stay on top */
        button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.8);
            border: none;
            cursor: pointer;
            border-radius: 5px;
            z-index: 10;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
        }
    </style>

</head>

<body>
    <select id="game-selector" onchange="navigateTo(this.value)">
        <option value="./assets/robot/">robot</option>
        <option value="./assets/wildWest/">wildWest</option>
    </select>
    <script>
        (function () {
            var path = new URLSearchParams(window.location.search).get('path');
            var defaultPath = './assets/robot/';
            
            if (path) {
                document.getElementById('game-selector').value = path;
            } else {
                // Set default selection and navigate to it
                navigateTo(defaultPath);
            }
        })();

        function navigateTo(path) {
            var url = new URL(window.location.href);
            url.searchParams.set('path', path);
            window.location.href = url.toString();
        }

    </script>
    <div id="game-container"></div>
    <script src="bundle.js"></script>
